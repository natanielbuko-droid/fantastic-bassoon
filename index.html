<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalkulator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="calculator">
    <div class="display">
      <div class="display-expression" id="expression"></div>
      <div class="display-current" id="current">0</div>
    </div>
    <div class="keys">
      <button class="key key-op" data-action="clear">C</button>
      <button class="key key-op" data-action="backspace">⌫</button>
      <button class="key key-op" data-action="percent">%</button>
      <button class="key key-op" data-value="/">÷</button>

      <button class="key" data-value="7">7</button>
      <button class="key" data-value="8">8</button>
      <button class="key" data-value="9">9</button>
      <button class="key key-op" data-value="*">×</button>

      <button class="key" data-value="4">4</button>
      <button class="key" data-value="5">5</button>
      <button class="key" data-value="6">6</button>
      <button class="key key-op" data-value="-">−</button>

      <button class="key" data-value="1">1</button>
      <button class="key" data-value="2">2</button>
      <button class="key" data-value="3">3</button>
      <button class="key key-op" data-value="+">+</button>

      <button class="key key-zero" data-value="0">0</button>
      <button class="key" data-action="decimal">,</button>
      <button class="key key-equals" data-action="equals">=</button>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
